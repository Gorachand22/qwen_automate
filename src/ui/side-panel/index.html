<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qwen Automation</title>
  <link rel="icon" type="image/png" href="../../assets/logo.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      padding: 16px;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(139, 92, 246, 0.3);
    }

    .logo {
      width: 48px;
      height: 48px;
      margin-bottom: 8px;
      border-radius: 12px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
      background: linear-gradient(90deg, #8b5cf6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      font-size: 11px;
      color: #888;
    }

    .status {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .status-item:last-child {
      border-bottom: none;
    }

    .status-label {
      font-size: 12px;
      color: #888;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-label::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #444;
    }

    .status-value {
      font-size: 12px;
      color: #fff;
      font-weight: 500;
    }

    .status-value.connected {
      color: #4ade80;
    }

    .status-value.disconnected {
      color: #ef4444;
    }

    .task-form {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(139, 92, 246, 0.2);
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      color: #aaa;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: #8b5cf6;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      width: 100%;
      background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(139, 92, 246, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      background: #444;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .tasks-list {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .tasks-header {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .task-item {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      border-left: 3px solid #8b5cf6;
    }

    .task-item:last-child {
      margin-bottom: 0;
    }

    .task-id {
      font-size: 10px;
      color: #666;
      margin-bottom: 4px;
      font-family: monospace;
    }

    .task-prompt {
      font-size: 13px;
      color: #fff;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-meta {
      display: flex;
      gap: 8px;
      font-size: 10px;
      color: #666;
    }

    .task-meta span {
      padding: 2px 6px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
    }

    .task-status {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .task-status.pending {
      background: rgba(251, 191, 36, 0.2);
      color: #fbbf24;
    }

    .task-status.running {
      background: rgba(59, 130, 246, 0.2);
      color: #3b82f6;
      animation: pulse 1.5s infinite;
    }

    .task-status.completed {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }

    .task-status.failed {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .empty-state {
      text-align: center;
      padding: 30px 20px;
      color: #555;
      font-size: 13px;
    }

    .empty-state::before {
      content: '📋';
      display: block;
      font-size: 32px;
      margin-bottom: 8px;
    }

    .log {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      padding: 12px;
      margin-top: 16px;
      max-height: 200px;
      overflow-y: auto;
      font-family: 'Monaco', 'Menlo', monospace;
    }

    .log-header {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #666;
      text-transform: uppercase;
    }

    .log-entry {
      font-size: 10px;
      color: #555;
      padding: 3px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.02);
    }

    .log-entry.error {
      color: #ef4444;
    }

    .log-entry.success {
      color: #22c55e;
    }

    .log-entry.info {
      color: #3b82f6;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: none;
      margin-top: 8px;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
      box-shadow: none;
      transform: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="../../assets/logo.png" alt="Logo" class="logo">
    <h1>Qwen Automation</h1>
    <p>Free AI Generation for Clipchamp</p>
  </div>

  <div class="status">
    <div class="status-item">
      <span class="status-label">Bridge Status</span>
      <span class="status-value" id="bridge-status">Checking...</span>
    </div>
    <div class="status-item">
      <span class="status-label">Qwen Tab</span>
      <span class="status-value" id="qwen-status">Not detected</span>
    </div>
    <div class="status-item">
      <span class="status-label">Queue</span>
      <span class="status-value" id="queue-count">0 tasks</span>
    </div>
  </div>

  <div class="task-form">
    <div class="form-group">
      <label>Prompt</label>
      <textarea id="prompt-input" placeholder="Describe what you want to generate..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Mode</label>
        <select id="mode-select">
          <option value="image">Create Image</option>
          <option value="video">Create Video</option>
        </select>
      </div>
      <div class="form-group">
        <label>Aspect Ratio</label>
        <select id="ratio-select">
          <option value="1:1">1:1 (Square)</option>
          <option value="9:16">9:16 (TikTok/Shorts)</option>
          <option value="16:9">16:9 (YouTube)</option>
          <option value="3:4">3:4 (Portrait)</option>
          <option value="4:3">4:3 (Landscape)</option>
        </select>
      </div>
    </div>
    <button id="submit-btn">Add to Queue</button>
    <button id="open-qwen-btn" class="btn-secondary">Open Qwen Tab</button>
  </div>

  <div class="tasks-list">
    <div class="tasks-header">
      <span>Task Queue</span>
      <span id="task-count">0</span>
    </div>
    <div id="tasks-container">
      <div class="empty-state">No tasks in queue</div>
    </div>
  </div>

  <div class="log">
    <div class="log-header">Activity Log</div>
    <div id="log-container"></div>
  </div>

  <script src="bridge.js"></script>
</body>
</html>
